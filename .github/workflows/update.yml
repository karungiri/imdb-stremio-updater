name: Update and Deploy IMDb List

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run updater
        id: updater
        run: |
          node update-list.js
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "source_updated=true" >> $GITHUB_OUTPUT
          else
            echo "source_updated=false" >> $GITHUB_OUTPUT
          fi
          exit 0

      - name: Show summary
        run: |
          echo "Generated list.json:"
          head -n 40 list.json || true

      - name: Commit updated source.json
        if: steps.updater.outputs.source_updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source.json
          git commit -m "chore: auto-update source.json from IMDb list [$(date -u '+%Y-%m-%d')]"
          git push

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.VPS_SSH_KEY }}

      - name: Copy list.json to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/traefik/imdb-stremio-addon"
          scp -o StrictHostKeyChecking=no list.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/traefik/imdb-stremio-addon/list.json
