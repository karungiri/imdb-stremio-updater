name: Update and Deploy IMDb List

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run updater
        run: node update-list.js

      - name: Show summary
        run: |
          echo "Generated list.json:"
          head -n 40 list.json || true

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.VPS_SSH_KEY }}

      - name: Copy list.json to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/traefik/imdb-stremio-addon"
          scp -o StrictHostKeyChecking=no list.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/traefik/imdb-stremio-addon/list.json
