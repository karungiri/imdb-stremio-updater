name: Update IMDb list and push to VPS

on:
  schedule:
    - cron: '0 3 * * *'  # every day at 03:00 UTC
  workflow_dispatch:      # allow manual run

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run updater (fetch IMDb and build list.json)
        run: npm run update

      - name: Show summary
        run: |
          echo "Generated list.json:"
          head -n 20 list.json || true

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.VPS_SSH_KEY }}

      - name: Copy list.json to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/traefik/imdb-stremio-addon"
          scp -o StrictHostKeyChecking=no list.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/traefik/imdb-stremio-addon/list.json
